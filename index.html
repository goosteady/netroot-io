<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Netroot.io</title>
<link rel="stylesheet" href="styles.css">
<style>
  body { margin: 0; background: var(--color-bg); min-height: 100vh; display: flex; flex-direction: column; }
  .wrap { max-width: 640px; margin: auto; padding: 40px clamp(20px,5vw,48px); text-align: center; }
  .brand { display:flex; align-items:center; justify-content:center; gap:10px; color:var(--color-text); text-decoration:none; margin-bottom: 48px; }
  .brand span { font-family:var(--font-heading); font-weight:600; font-size:19px; letter-spacing:-0.01em; }
  .brand .tld { color:var(--color-accent-700); }
  .kicker { display:block; font-size:13px; line-height:14px; letter-spacing:0.08em; text-transform:uppercase; color:var(--color-accent-700); margin:0 0 14px; }
  h1 { font-family:var(--font-heading); font-weight:400; font-size:clamp(34px,5vw,52px); line-height:1.15; letter-spacing:-0.01em; margin:0; }
  p { font-size:16px; line-height:27px; color:color-mix(in srgb, var(--color-text) 78%, transparent); margin:22px auto 0; max-width:44ch; }
  .foot { padding:28px 0; font-size:12.5px; color:color-mix(in srgb, var(--color-text) 60%, transparent); text-align:center; }
</style>
</head>
<body>
  <div class="wrap">
    <a class="brand" href="/">
      <svg viewBox="0 0 64 64" width="30" height="30" aria-hidden="true">
        <circle cx="32" cy="32" r="30" fill="none" stroke="#1f3a63" stroke-width="2"></circle>
        <circle cx="32" cy="32" r="24" fill="none" stroke="#b68235" stroke-width="1"></circle>
        <line x1="32" y1="14" x2="32" y2="40" stroke="#1f3a63" stroke-width="2.5" stroke-linecap="round"></line>
        <line x1="24" y1="21" x2="40" y2="21" stroke="#1f3a63" stroke-width="2.5" stroke-linecap="round"></line>
        <path d="M 20 40 Q 32 52 44 40" fill="none" stroke="#b68235" stroke-width="2.5" stroke-linecap="round"></path>
        <circle cx="32" cy="16" r="2.2" fill="#b68235"></circle>
      </svg>
      <span>Netroot<span class="tld">.io</span></span>
    </a>
    <span class="kicker">Personal site</span>
    <h1>Netroot.io</h1>
    <p>This is my personal corner of the internet. More to come.</p>
  </div>
  <footer class="foot">&copy; Netroot.io</footer>
</body>
</html>
