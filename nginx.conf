server {
    listen $PORT;
    root /usr/share/nginx/html;
    index index.html;

    # Re-resolve Railway private-network names at runtime so a redeployed
    # backend's new internal IP is picked up (nginx otherwise caches the
    # IP from startup forever). $RESOLVER is filled from the container's
    # /etc/resolv.conf at boot; the variable proxy_pass targets force
    # per-request resolution.
    resolver $RESOLVER valid=10s;

    location / {
        try_files $uri $uri/ =404;
    }

    location = /la-mystique-divine {
        return 301 /la-mystique-divine/;
    }

    location /la-mystique-divine/ {
        set $up_lmd la-mystique-divine.railway.internal:8080;
        rewrite ^/la-mystique-divine/(.*)$ /$1 break;
        proxy_pass http://$up_lmd;
        proxy_set_header Host $host;
    }

    location = /humility {
        return 301 /humility/;
    }

    location /humility/ {
        set $up_hum humility.railway.internal:8080;
        rewrite ^/humility/(.*)$ /$1 break;
        proxy_pass http://$up_hum;
        proxy_set_header Host $host;
    }
}
