server {
    listen $PORT;
    server_name netroot.io www.netroot.io _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # The library moved to breviarium.ink — send old links there instead of 404s.
    location = /la-mystique-divine {
        return 301 https://breviarium.ink/la-mystique-divine/;
    }

    location /la-mystique-divine/ {
        return 301 https://breviarium.ink$request_uri;
    }

    location = /humility {
        return 301 https://breviarium.ink/humility/;
    }

    location /humility/ {
        return 301 https://breviarium.ink$request_uri;
    }
}
