server {
    listen $PORT;
    server_name breviarium.ink www.breviarium.ink;
    root /usr/share/nginx/html/breviarium;
    index index.html;

    # Re-resolve Railway private-network names at runtime so a redeployed
    # backend's new internal IP is picked up (nginx otherwise caches the
    # IP from startup forever). fd12::10 is Railway's internal DNS; the
    # variable proxy_pass targets below force per-request resolution.
    resolver [fd12::10] valid=10s;

    location / {
        try_files $uri $uri/ =404;
    }

    location = /la-mystique-divine {
        return 301 /la-mystique-divine/;
    }

    location /la-mystique-divine/ {
        set $up_lmd la-mystique-divine.railway.internal:8080;
        rewrite ^/la-mystique-divine/(.*)$ /$1 break;
        proxy_pass http://$up_lmd;
        proxy_set_header Host $host;
    }

    location = /humility {
        return 301 /humility/;
    }

    location /humility/ {
        set $up_hum humility.railway.internal:8080;
        rewrite ^/humility/(.*)$ /$1 break;
        proxy_pass http://$up_hum;
        proxy_set_header Host $host;
    }
}

server {
    listen $PORT default_server;
    server_name netroot.io www.netroot.io _;
    root /usr/share/nginx/html/netroot;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # The library moved to breviarium.ink — send old links there instead of 404s.
    location = /la-mystique-divine {
        return 301 https://breviarium.ink/la-mystique-divine/;
    }

    location /la-mystique-divine/ {
        return 301 https://breviarium.ink$request_uri;
    }

    location = /humility {
        return 301 https://breviarium.ink/humility/;
    }

    location /humility/ {
        return 301 https://breviarium.ink$request_uri;
    }
}
